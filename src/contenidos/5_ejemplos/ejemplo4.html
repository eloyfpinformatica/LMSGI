<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>5.4 — Pokédex con Fetch</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Buscador */
        .search-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }

        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #667eea; }

        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: #5568d3; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .sugerencias {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .sugerencias span {
            cursor: pointer;
            background: #f5f5f5;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .sugerencias span:hover { background: #e0e0e0; }

        /* Info de la API */
        .api-info {
            background: rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 25px;
            color: white;
            font-size: 0.85rem;
            display: none;
        }

        .api-info.visible { display: block; }

        .api-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .api-detail:last-child { margin-bottom: 0; }

        .api-label { opacity: 0.8; }
        .api-value { font-family: monospace; font-weight: bold; }

        /* Estados */
        #loading, #error {
            background: white;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #error { color: #e74c3c; }

        /* Tarjeta Pokémon */
        #pokemon-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            display: none;
        }

        .pokemon-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        #sprite {
            width: 120px;
            height: 120px;
            image-rendering: pixelated;
        }

        .pokemon-title h2 {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 5px;
            text-transform: capitalize;
        }

        .pokemon-number {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .types {
            display: flex;
            gap: 8px;
        }

        .type-badge {
            padding: 5px 14px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }

        /* Colores por tipo */
        .type-normal   { background: #A8A878; }
        .type-fire     { background: #F08030; }
        .type-water    { background: #6890F0; }
        .type-grass    { background: #78C850; }
        .type-electric { background: #F8D030; }
        .type-ice      { background: #98D8D8; }
        .type-fighting { background: #C03028; }
        .type-poison   { background: #A040A0; }
        .type-ground   { background: #E0C068; }
        .type-flying   { background: #A890F0; }
        .type-psychic  { background: #F85888; }
        .type-bug      { background: #A8B820; }
        .type-rock     { background: #B8A038; }
        .type-ghost    { background: #705898; }
        .type-dragon   { background: #7038F8; }
        .type-dark     { background: #705848; }
        .type-steel    { background: #B8B8D0; }
        .type-fairy    { background: #EE99AC; }

        /* Stats */
        .stats-section {
            margin-top: 25px;
        }

        .stats-section h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .stat-name {
            min-width: 100px;
            font-size: 0.85rem;
            color: #666;
            text-transform: uppercase;
        }

        .stat-bar-container {
            flex: 1;
            background: #f0f0f0;
            border-radius: 10px;
            height: 20px;
            position: relative;
            overflow: hidden;
        }

        .stat-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .stat-value {
            min-width: 35px;
            text-align: right;
            font-weight: bold;
            color: #2c3e50;
        }

        /* Habilidades */
        .abilities {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .abilities h4 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .abilities-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .ability-badge {
            background: #f5f5f5;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔍 Pokédex Interactiva</h1>
        <p class="subtitle">Ejemplo completo de fetch() con PokéAPI</p>

        <!-- Buscador -->
        <div class="search-box">
            <div class="search-row">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Nombre o número (ej: pikachu, 25)"
                    value="pikachu"
                >
                <button id="searchBtn">Buscar</button>
            </div>
            <div class="sugerencias">
                Prueba:
                <span onclick="buscar('charizard')">charizard</span>
                <span onclick="buscar('mewtwo')">mewtwo</span>
                <span onclick="buscar('25')">25</span>
                <span onclick="buscar('pokemon-inventado')">inventado ❌</span>
            </div>
        </div>

        <!-- Info de la petición (educativa) -->
        <div id="apiInfo" class="api-info">
            <div class="api-detail">
                <span class="api-label">URL solicitada:</span>
                <span class="api-value" id="apiUrl"></span>
            </div>
            <div class="api-detail">
                <span class="api-label">Código de estado:</span>
                <span class="api-value" id="apiStatus"></span>
            </div>
            <div class="api-detail">
                <span class="api-label">Tiempo de respuesta:</span>
                <span class="api-value" id="apiTime"></span>
            </div>
        </div>

        <!-- Estados -->
        <div id="loading">
            <div class="spinner"></div>
            <p>Consultando PokéAPI...</p>
        </div>

        <div id="error">
            <p id="errorMsg"></p>
        </div>

        <!-- Tarjeta del Pokémon -->
        <div id="pokemon-card">
            <div class="pokemon-header">
                <img id="sprite" src="" alt="">
                <div class="pokemon-title">
                    <h2 id="pokemonName"></h2>
                    <p class="pokemon-number" id="pokemonNumber"></p>
                    <div id="types" class="types"></div>
                </div>
            </div>

            <div class="stats-section">
                <h3>📊 Estadísticas Base</h3>
                <div id="statsContainer"></div>
            </div>

            <div class="abilities">
                <h4>💫 Habilidades</h4>
                <div id="abilitiesContainer" class="abilities-list"></div>
            </div>
        </div>
    </div>

    <script>

        // -------------------------------------------------------
        // FUNCIÓN PRINCIPAL DE BÚSQUEDA
        // -------------------------------------------------------

        async function buscar(query) {
            const url = `https://pokeapi.co/api/v2/pokemon/${query.toLowerCase()}`;

            // 1. Mostrar estado de carga
            mostrarCargando();

            // Variables para medir el tiempo de respuesta
            const inicio = performance.now();

            try {
                // 2. PETICIÓN CON HEADERS PERSONALIZADOS (opcional pero educativo)
                const respuesta = await fetch(url, {
                    method: 'GET',  // Por defecto, pero lo especificamos para claridad
                    headers: {
                        'Accept': 'application/json',
                        'User-Agent': 'Pokedex-Educativa/1.0'
                        // PokéAPI no requiere estos headers, pero es buena práctica incluirlos
                    }
                });

                const tiempoRespuesta = (performance.now() - inicio).toFixed(0);

                // 3. MANEJO DE ERRORES HTTP
                if (!respuesta.ok) {
                    if (respuesta.status === 404) {
                        throw new Error('Pokémon no encontrado. Verifica el nombre o número.');
                    }
                    throw new Error(`Error HTTP ${respuesta.status}: ${respuesta.statusText}`);
                }

                // 4. Convertir respuesta a JSON
                const pokemon = await respuesta.json();

                // 5. MOSTRAR INFO DE LA PETICIÓN (educativo)
                mostrarInfoAPI(url, respuesta.status, tiempoRespuesta);

                // 6. TRANSFORMAR DATOS
                const pokemonSimplificado = transformarDatos(pokemon);

                // 7. RENDERIZAR
                renderizarPokemon(pokemonSimplificado);
                mostrarTarjeta();

            } catch (error) {
                // ERRORES: red, 404, JSON inválido, etc.
                mostrarError(error.message);
            }
        }


        // -------------------------------------------------------
        // TRANSFORMACIÓN DE DATOS
        // La API devuelve mucha información. Extraemos solo lo necesario.
        // -------------------------------------------------------

        function transformarDatos(pokemon) {
            return {
                id: pokemon.id,
                nombre: pokemon.name,
                sprite: pokemon.sprites.front_default,
                tipos: pokemon.types.map(t => t.type.name),
                stats: pokemon.stats.map(s => ({
                    nombre: s.stat.name,
                    valor: s.base_stat
                })),
                habilidades: pokemon.abilities.map(a => a.ability.name)
            };
        }


        // -------------------------------------------------------
        // RENDERIZADO
        // -------------------------------------------------------

        function renderizarPokemon(pokemon) {
            // Cabecera
            document.getElementById('sprite').src = pokemon.sprite;
            document.getElementById('pokemonName').textContent = pokemon.nombre;
            document.getElementById('pokemonNumber').textContent = `#${pokemon.id.toString().padStart(3, '0')}`;

            // Tipos
            const typesContainer = document.getElementById('types');
            typesContainer.innerHTML = pokemon.tipos
                .map(tipo => `<span class="type-badge type-${tipo}">${tipo}</span>`)
                .join('');

            // Stats
            const statsContainer = document.getElementById('statsContainer');
            statsContainer.innerHTML = pokemon.stats
                .map(stat => {
                    const porcentaje = (stat.valor / 255) * 100; // 255 es el máximo teórico
                    return `
                        <div class="stat-row">
                            <span class="stat-name">${stat.nombre}</span>
                            <div class="stat-bar-container">
                                <div class="stat-bar" style="width: ${porcentaje}%"></div>
                            </div>
                            <span class="stat-value">${stat.valor}</span>
                        </div>
                    `;
                })
                .join('');

            // Habilidades
            const abilitiesContainer = document.getElementById('abilitiesContainer');
            abilitiesContainer.innerHTML = pokemon.habilidades
                .map(hab => `<span class="ability-badge">${hab}</span>`)
                .join('');
        }


        // -------------------------------------------------------
        // GESTIÓN DE ESTADOS DE UI
        // -------------------------------------------------------

        function mostrarCargando() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('pokemon-card').style.display = 'none';
            document.getElementById('apiInfo').classList.remove('visible');
            document.getElementById('searchBtn').disabled = true;
        }

        function mostrarTarjeta() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('pokemon-card').style.display = 'block';
            document.getElementById('searchBtn').disabled = false;
        }

        function mostrarError(mensaje) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('errorMsg').textContent = `❌ ${mensaje}`;
            document.getElementById('searchBtn').disabled = false;
        }

        function mostrarInfoAPI(url, status, tiempo) {
            document.getElementById('apiUrl').textContent = url.split('/').pop();
            document.getElementById('apiStatus').textContent = `${status} OK`;
            document.getElementById('apiTime').textContent = `${tiempo} ms`;
            document.getElementById('apiInfo').classList.add('visible');
        }


        // -------------------------------------------------------
        // EVENTOS
        // -------------------------------------------------------

        document.getElementById('searchBtn').addEventListener('click', () => {
            const query = document.getElementById('searchInput').value.trim();
            if (query) buscar(query);
        });

        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                const query = document.getElementById('searchInput').value.trim();
                if (query) buscar(query);
            }
        });


        // -------------------------------------------------------
        // CARGA INICIAL
        // -------------------------------------------------------

        buscar('pikachu');

    </script>

</body>
</html>
